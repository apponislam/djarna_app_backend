<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DJARNA | Backend Running</title>
        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
        <style>
            :root {
                --primary: #b8841d;
                --primary-light: #d4a03d;
                --bg: #0a0a0a;
                --card-bg: rgba(20, 20, 20, 0.7);
                --text: #ffffff;
                --text-dim: #a0a0a0;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Plus Jakarta Sans", sans-serif;
                background-color: var(--bg);
                color: var(--text);
                min-height: 100vh;
                width: 100vw;
                overflow-x: hidden;
                overflow-y: auto;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            /* Animated Background */
            .bg-glow {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(circle at 20% 30%, rgba(184, 132, 29, 0.15) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(184, 132, 29, 0.1) 0%, transparent 40%);
                z-index: -1;
            }

            .main-content {
                width: 100%;
                max-width: 1200px;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                z-index: 1;
            }

            .logo-section {
                margin-bottom: 4rem;
                text-align: center;
                animation: fadeInDown 1s ease-out;
            }

            .logo {
                font-size: 5rem;
                font-weight: 800;
                color: var(--primary);
                letter-spacing: -2px;
                line-height: 1;
                margin-bottom: 0.5rem;
                text-shadow: 0 0 30px rgba(184, 132, 29, 0.3);
            }

            .tagline {
                color: var(--text-dim);
                font-size: 1.1rem;
                font-weight: 400;
                letter-spacing: 4px;
                text-transform: uppercase;
            }

            .status-card {
                background: var(--card-bg);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(184, 132, 29, 0.2);
                border-radius: 32px;
                padding: 4rem;
                width: 100%;
                max-width: 600px;
                text-align: center;
                box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
                animation: fadeInUp 1s ease-out 0.2s both;
            }

            .status-indicator {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                background: rgba(184, 132, 29, 0.1);
                padding: 8px 20px;
                border-radius: 100px;
                margin-bottom: 2rem;
                border: 1px solid rgba(184, 132, 29, 0.2);
            }

            .dot {
                width: 10px;
                height: 10px;
                background: var(--primary);
                border-radius: 50%;
                box-shadow: 0 0 15px var(--primary);
                animation: pulse 2s infinite;
            }

            .status-text {
                color: var(--primary);
                font-weight: 600;
                font-size: 0.9rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            h1 {
                font-size: 2.5rem;
                font-weight: 800;
                margin-bottom: 1.5rem;
                background: linear-gradient(to bottom, #fff, #888);
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .info-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
                margin-top: 3rem;
                padding-top: 3rem;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }

            .info-item {
                text-align: left;
            }

            .info-label {
                color: var(--text-dim);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 4px;
            }

            .info-value {
                color: var(--text);
                font-weight: 600;
                font-size: 1.1rem;
            }

            .time-section {
                margin-top: 3rem;
                text-align: center;
                color: var(--text-dim);
                animation: fadeIn 1.5s ease-out 0.5s both;
            }

            #timestamp {
                font-size: 0.9rem;
                font-weight: 400;
                letter-spacing: 1px;
            }

            @keyframes pulse {
                0% {
                    opacity: 1;
                    transform: scale(1);
                }
                50% {
                    opacity: 0.4;
                    transform: scale(1.2);
                }
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes fadeInDown {
                from {
                    opacity: 0;
                    transform: translateY(-30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(40px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            @media (max-width: 768px) {
                .logo {
                    font-size: 3rem;
                }
                .tagline {
                    font-size: 0.8rem;
                    letter-spacing: 2px;
                }
                .status-card {
                    padding: 2rem 1.5rem;
                    border-radius: 24px;
                }
                h1 {
                    font-size: 1.8rem;
                }
                .info-grid {
                    grid-template-columns: 1fr;
                    gap: 1.5rem;
                    margin-top: 2rem;
                    padding-top: 2rem;
                }
                .info-value {
                    font-size: 1rem;
                }
                .logo-section {
                    margin-bottom: 2.5rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="bg-glow"></div>

        <div class="main-content">
            <div class="logo-section">
                <div class="logo">DJARNA</div>
                <p class="tagline">Core API Ecosystem</p>
            </div>

            <div class="status-card">
                <div class="status-indicator">
                    <div class="dot"></div>
                    <span class="status-text">System Online</span>
                </div>
                <h1>Server is Running</h1>

                <div class="info-grid">
                    <div class="info-item">
                        <p class="info-label">Environment</p>
                        <p class="info-value">Production</p>
                    </div>
                    <div class="info-item">
                        <p class="info-label">Port</p>
                        <p class="info-value">5000</p>
                    </div>
                </div>
            </div>

            <div class="time-section">
                <p id="timestamp"></p>
            </div>
        </div>

        <script>
            function updateTimestamp() {
                const now = new Date();
                const timeString = now.toLocaleTimeString("en-US", {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                    hour12: false,
                });
                const dateString = now.toLocaleDateString("en-US", {
                    month: "long",
                    day: "numeric",
                    year: "numeric",
                });
                document.getElementById("timestamp").textContent = `${dateString} | ${timeString}`;
            }

            updateTimestamp();
            setInterval(updateTimestamp, 1000);
        </script>
    </body>
</html>
